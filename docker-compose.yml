services:
  backend:
    build: .
    container_name: biliagent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/biliagent.db

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_BASE: ""
    container_name: biliagent-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
